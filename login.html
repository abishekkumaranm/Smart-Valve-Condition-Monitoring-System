<!DOCTYPE html>

<html>

<head>

<title>Smart Valve Monitoring Login</title>

<style>

body{
background:#050f1f;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#0f1f35;
padding:35px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.6);
}

.login-box h2{
margin-bottom:20px;
color:#7cc7ff;
}

input{
width:92%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
font-size:14px;
}

button{
background:#0077ff;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#00a2ff;
}

#msg{
margin-top:10px;
color:#ff6b6b;
}

.secure-text{
margin-top:15px;
color:#7cc7ff;
font-size:12px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Industrial Dashboard Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

<div class="secure-text">
Secure Industrial Access Control
</div>

</div>

<script>

function login(){

let username=document.getElementById("username").value
let password=document.getElementById("password").value

fetch("http://127.0.0.1:8000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:username,
password:password
})

})

.then(res=>{

if(!res.ok){
document.getElementById("msg").innerText="Invalid username or password"
throw new Error("login failed")
}

return res.json()

})

.then(data=>{

localStorage.setItem("user",username)

window.location="index.html"

})

.catch(err=>{
console.log(err)
})

}

</script>

</body>

</html>
